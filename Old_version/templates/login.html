{% extends "base.html" %}
{% block title %}Sign In — PulseMailer{% endblock %}

{% block public_content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon-lg">✉</div>
      <h1>PulseMailer</h1>
      <p>Sign in to your account</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form" autocomplete="off">

      <div class="form-row">
        <label for="identifier">Username or Email</label>
        <input id="identifier" class="form-control" type="text" name="identifier"
               placeholder="Enter username or email" required autofocus />
      </div>

      <div class="form-row">
        <label for="password">Password</label>
        <div class="input-group">
          <input id="password" class="form-control" type="password" name="password"
                 placeholder="Enter your password" required />
          <button type="button" class="password-toggle" title="Show/hide">👁</button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full">
        Sign In
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account?
      <a href="{{ url_for('auth.register') }}">Create one</a>
    </div>
  </div>
</div>
{% endblock %}
