{% extends "base.html" %}
{% block title %}Create Account — MailApp{% endblock %}

{% block public_content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon-lg">✉</div>
      <h1>Create Account</h1>
      <p>Join MailApp today</p>
    </div>

    <form method="POST" action="{{ url_for('auth.register') }}" class="auth-form" autocomplete="off">

      <div class="form-row">
        <label for="username">Username</label>
        <input id="username" class="form-control" type="text" name="username"
               value="{{ username or '' }}" placeholder="Choose a username" required autofocus
               minlength="3" maxlength="32" />
      </div>

      <div class="form-row">
        <label for="email">Email</label>
        <input id="email" class="form-control" type="email" name="email"
               value="{{ email or '' }}" placeholder="your@email.com" required />
      </div>

      <div class="form-row">
        <label for="password">Password</label>
        <div class="input-group">
          <input id="password" class="form-control" type="password" name="password"
                 placeholder="At least 6 characters" required minlength="6" />
          <button type="button" class="password-toggle" title="Show/hide">👁</button>
        </div>
      </div>

      <div class="form-row">
        <label for="confirm_password">Confirm Password</label>
        <div class="input-group">
          <input id="confirm_password" class="form-control" type="password" name="confirm_password"
                 placeholder="Repeat your password" required />
          <button type="button" class="password-toggle" title="Show/hide">👁</button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full">
        Create Account
      </button>
    </form>

    <div class="auth-footer">
      Already have an account?
      <a href="{{ url_for('auth.login') }}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
